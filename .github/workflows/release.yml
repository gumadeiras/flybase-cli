name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  homebrew-tap:
    needs:
      - build
      - github-release
      - pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Check tap token
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "missing HOMEBREW_TAP_TOKEN secret" >&2
            exit 1
          fi

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gumadeiras/homebrew-tap
          token: ${{ env.TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          version="${GITHUB_REF_NAME#v}"
          sdist="dist/flybase_cli-${version}.tar.gz"
          sha256="$(sha256sum "$sdist" | awk '{print $1}')"
          python homebrew-tap/scripts/update_formula.py \
            --formula homebrew-tap/Formula/flybase-cli.rb \
            --url "https://github.com/gumadeiras/flybase-cli/releases/download/v${version}/flybase_cli-${version}.tar.gz" \
            --sha256 "$sha256"

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/flybase-cli.rb; then
            echo "Formula/flybase-cli.rb already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/flybase-cli.rb
          git commit -m "Update flybase-cli to ${GITHUB_REF_NAME#v}"
          git push
